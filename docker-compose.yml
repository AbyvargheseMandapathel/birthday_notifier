version: '3.8'

services:
  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    networks:
      - coolify

  backend:
    build: ./backend
    expose:
      - "8000"
    env_file:
      - .env
    environment:
      - RUN_MIGRATIONS=true
    depends_on:
      - redis
    networks:
      - coolify

  celery_worker:
    build: ./backend
    command: celery -A core worker -l info
    env_file:
      - .env
    depends_on:
      - redis
    networks:
      - coolify

  celery_beat:
    build: ./backend
    command: celery -A core beat -l info
    env_file:
      - .env
    depends_on:
      - redis
    networks:
      - coolify

  frontend:
    build: ./frontend
    expose:
      - "3000"
    env_file:
      - .env
    depends_on:
      - backend
    networks:
      - coolify

networks:
  coolify:
    external: true
