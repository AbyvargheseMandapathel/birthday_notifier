version: '3.8'

services:
  redis:
    image: redis:7-alpine
    expose:
      - "6379"

  backend:
    build: ./backend
    command: python manage.py runserver 0.0.0.0:8000
    expose:
      - "8000"
    env_file:
      - .env
    environment:
      - RUN_MIGRATIONS=true
    depends_on:
      - redis

  celery_worker:
    build: ./backend
    command: celery -A core worker -l info
    env_file:
      - .env
    depends_on:
      - redis

  celery_beat:
    build: ./backend
    command: celery -A core beat -l info
    env_file:
      - .env
    depends_on:
      - redis

  frontend:
    build: ./frontend
    expose:
      - "3000"
    env_file:
      - .env
    depends_on:
      - backend
